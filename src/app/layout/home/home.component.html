<div class="dashboard-home">
    <header class="dashboard-header">
        <h1>Welcome to the PropHire Workflow System</h1>
    </header>

    <div class="stats-grid">
        <mat-card class="stat-card" routerLink="/projects" matRipple>
            <mat-card-header>
                <mat-icon mat-card-avatar>folder</mat-icon>
                <mat-card-title>Projects</mat-card-title>
                <mat-card-subtitle>Active Projects</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-value">4 Ongoing Projects</p>
            </mat-card-content>
        </mat-card>

        <mat-card class="stat-card" routerLink="/trainees" matRipple>
            <mat-card-header>
                <mat-icon mat-card-avatar>people</mat-icon>
                <mat-card-title>Trainees</mat-card-title>
                <mat-card-subtitle>In Pipeline</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-value">8 Trainees</p>
            </mat-card-content>
        </mat-card>
        <mat-card class="stat-card" routerLink="/trainings" matRipple>
            <mat-card-header>
                <mat-icon mat-card-avatar>school</mat-icon>
                <mat-card-title>Trainings</mat-card-title>
                <mat-card-subtitle>In Pipeline</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-value">4 Trainings</p>
            </mat-card-content>
        </mat-card>
        <mat-card class="stat-card" routerLink="/vendors" matRipple>
            <mat-card-header>
                <mat-icon mat-card-avatar>store</mat-icon>
                <mat-card-title>Vendors</mat-card-title>
                <mat-card-subtitle>In Pipeline</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p class="stat-value">3 Vendors</p>
            </mat-card-content>
        </mat-card>
    </div>
</div>
