<div class="page-header">
    <h2>Clients</h2>
    <button mat-flat-button color="primary" (click)="openClientForm()">
        <mat-icon>add</mat-icon> Add Client
    </button>
</div>

<mat-table [dataSource]="clients" class="mat-elevation-z2">
    <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let client">{{ client.name }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="industry">
        <mat-header-cell *matHeaderCellDef>Industry</mat-header-cell>
        <mat-cell *matCellDef="let client">{{ client.industry }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="address">
        <mat-header-cell *matHeaderCellDef>Address</mat-header-cell>
        <mat-cell *matCellDef="let client">{{ client.address }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let client">
            <button mat-icon-button (click)="openClientForm(client)">
                <mat-icon color="accent">edit</mat-icon>
            </button>
        </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>
