<div class="vendor-container">
    <header class="vendor-header">
        <div class="header-left">
            <h1>Vendor Management</h1>
        </div>
        <button mat-raised-button color="primary" (click)="openVendorForm()">
            <mat-icon>add</mat-icon> ADD VENDOR
        </button>
    </header>

    <div class="filter-row">
        <mat-form-field appearance="outline" class="search-field">
            <mat-label>Search Vendors</mat-label>
            <input matInput (keyup)="applySearch($event)" placeholder="Search by name, email or company">
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="status-field">
            <mat-label>Filter by Status</mat-label>
            <mat-select [(value)]="filters.status" (selectionChange)="onStatusChange($event.value)">
                <mat-option value="All">All Statuses</mat-option>
                <mat-option value="Active">Active</mat-option>
                <mat-option value="Inactive">Inactive</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <div class="mat-elevation-z2 table-container">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                <td mat-cell *matCellDef="let vendor"> {{vendor.name}} </td>
            </ng-container>

            <!-- Email Column -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
                <td mat-cell *matCellDef="let vendor"> {{vendor.email}} </td>
            </ng-container>

            <!-- Phone Column -->
            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef> Phone </th>
                <td mat-cell *matCellDef="let vendor"> {{vendor.phone}} </td>
            </ng-container>

            <!-- Company Column -->
            <ng-container matColumnDef="company">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Company </th>
                <td mat-cell *matCellDef="let vendor"> {{vendor.company}} </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
                <td mat-cell *matCellDef="let vendor">
                    <span class="status-badge" [ngClass]="vendor.status.toLowerCase()">
                        {{vendor.status}}
                    </span>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let vendor">
                    <button mat-icon-button color="primary" (click)="openVendorForm(vendor)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteVendor(vendor.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell no-data" colspan="6">No vendors found matching the filters.</td>
            </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of vendors"></mat-paginator>
    </div>
</div>
